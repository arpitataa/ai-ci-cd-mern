name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v3
  
  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: '18'

  - name: Install server dependencies
    working-directory: server
    run: npm install

  - name: Install client dependencies
    working-directory: client
    run: npm install

  - name: Login to Docker Hub
    uses: docker/login-action@v2
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_TOKEN }}

  - name: Build Server Image
    run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-ci-cd-server:latest ./server

  - name: Push Server Image
    run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-ci-cd-server:latest

  - name: Build Client Image
    run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-ci-cd-client:latest ./client

  - name: Push Client Image
    run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-ci-cd-client:latest
