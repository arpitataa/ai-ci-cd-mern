name: CI/CD Pipeline

on:
push:
branches:
- main

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  # 1. Checkout code
  - name: Checkout code
    uses: actions/checkout@v3

  # 2. Setup Node
  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: 18

  # 3. Install server dependencies
  - name: Install server dependencies
    run: |
      cd server
      npm install

  # 4. Install client dependencies
  - name: Install client dependencies
    run: |
      cd client
      npm install

  # 5. Login to Docker Hub
  - name: Login to Docker Hub
    uses: docker/login-action@v2
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_TOKEN }}

  # 6. Build SERVER image
  - name: Build Server Image
    run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-ci-cd-server:latest ./server

  # 7. Push SERVER image
  - name: Push Server Image
    run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-ci-cd-server:latest

  # 8. Build CLIENT image
  - name: Build Client Image
    run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-ci-cd-client:latest ./client

  # 9. Push CLIENT image
  - name: Push Client Image
    run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-ci-cd-client:latest
```
