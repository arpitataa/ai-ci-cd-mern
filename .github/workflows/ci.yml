name: My First Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Get Code
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Backend steps
      - name: Install Backend Dependencies
        run: |
          cd server
          npm install

      - name: Test Backend
        run: |
          cd server
          npm test

      # Frontend steps
      - name: Install Frontend Dependencies
        run: |
          cd client
          npm install

      - name: Build Frontend
        run: |
          cd client
          npm run build

      # Docker builds
      - name: Build Frontend Docker Image
        run: docker build -t my-frontend ./client

      - name: Build Backend Docker Image
        run: docker build -t my-backend ./server

        #trigger pipeline 